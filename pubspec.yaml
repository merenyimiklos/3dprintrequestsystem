name: print_request_system
description: A school 3D printing request management system for students and teachers.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.2
  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Unique IDs
  uuid: ^4.3.3
  # Date formatting
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
